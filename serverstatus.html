<!DOCTYPE html>
<html style="background-color: #1a222d">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="png" href="favicon.png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.min.css" />
    <link rel="stylesheet" href="serverstatus.css" />
    <title>Server Status</title>
  </head>
  <body>
    <h1>Minecraft Servers</h1>
    
    <div id="servers-container" class="server-grid">
      <p>Loading servers...</p>
    </div>

<script>
  const SERVERS = [
    { 
      name: "BetterMC", 
      fetchIp: "bettermc.tomgx.com", 
      displayIp: "bettermc.tomgx.com",
      modpack: "Better MC [FORGE] - BMC4 v56",
      url: "https://www.curseforge.com/minecraft/modpacks/better-mc-forge-bmc4/files/7736693",
      restartHourUTC: 3, 
      restartMinUTC: 0
    },
    { 
      name: "RLCraft", 
      fetchIp: "rlcraftdregora.tomgx.com", 
      displayIp: "rlcraftdregora.tomgx.com",
      modpack: "RLCraft Dregora",
      url: "https://www.curseforge.com/minecraft/modpacks/rlcraft-dregora",
      restartHourUTC: 3, 
      restartMinUTC: 15
    }
  ];

  let lastUpdatedMinute = -1;

  function getRestartStatus(server) {
    const now = new Date();
    const nowUTC = new Date(now.getTime() + now.getTimezoneOffset() * 60000);
    
    let nextRestart = new Date(Date.UTC(
      nowUTC.getUTCFullYear(),
      nowUTC.getUTCMonth(),
      nowUTC.getUTCDate(),
      server.restartHourUTC,
      server.restartMinUTC
    ));

    if (nowUTC > nextRestart) {
      nextRestart.setUTCDate(nextRestart.getUTCDate() + 1);
    }

    const diffMs = nextRestart - nowUTC;
    const diffMinsTotal = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMinsTotal / 60);
    const diffMins = diffMinsTotal % 60;

    if (diffMinsTotal < 30) {
      return `Restart: <span style="color: #e74c3c; font-weight: bold;">in ${diffMinsTotal}m</span>`;
    } else if (diffMinsTotal < 60) {
      return `Restart: <span style="color: #f39c12;">in ${diffMinsTotal}m</span>`;
    } else {
      return `Restart: <span style="color: #8b949e;">in ${diffHours}h ${diffMins}m</span>`;
    }
  }

  function initDashboard() {
    const container = document.getElementById('servers-container');
    container.innerHTML = ''; 

    SERVERS.forEach(server => {
      const safeName = server.name.replace(/\s+/g, '');
      const card = document.createElement('div');
      card.className = 'server-card';
      card.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
          <div>
            <h3 style="margin: 0; color: #58a6ff;">${server.name}</h3>
            <code onclick="copyIp('${server.displayIp}', event)" style="font-size: 0.85em; cursor: pointer; border: 1px dashed #444; padding: 2px 5px;">${server.displayIp}</code>
          </div>
          <div id="dot-${safeName}" class="status-dot"></div>
        </div>
        
        <div style="margin: 15px 0 10px 0; font-size: 0.85em; color: #8b949e;">
          <span style="display: block; margin-bottom: 4px; color: #d1d5da;">📦 <b>Modpack:</b></span>
          <a href="${server.url}" target="_blank" class="modpack-link">${server.modpack}</a>
        </div>

        <p style="margin: 5px 0 5px 0;">Players: <b id="players-${safeName}">-</b></p>
        <div id="btn-area-${safeName}" style="margin-bottom: 10px;"></div>
        <div id="player-list-${safeName}" style="display: none; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; padding: 10px; background: #0d1117; border-radius: 6px; border: 1px solid #30363d; max-height: 150px; overflow-y: auto;"></div>
        
        <p style="margin: 0;">Version: <small id="version-${safeName}">-</small></p>
        <blockquote id="motd-${safeName}" style="font-size: 0.85em; color: #8b949e; border-left: 2px solid #30363d; margin: 15px 0 10px 0; padding-left: 10px; min-height: 20px;"></blockquote>
        
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; padding-top: 15px; border-top: 1px solid #30363d;">
           <img id="icon-${safeName}" src="" style="width: 32px; height: 32px; border-radius: 4px; display: none;">
           <div style="text-align: right; margin-left: auto;">
             <small id="restart-${safeName}" style="display: block; font-size: 0.75em; margin-bottom: 2px;"></small>
             <small id="time-${safeName}" style="display: block; color: #484f58; font-size: 0.7em;"></small>
           </div>
        </div>
      `;
      container.appendChild(card);
    });
    
    updateAllData();
    tick(); 
    setInterval(tick, 1000); 
  }

  function tick() {
    const now = new Date();
    
    // restart countdown update every second
    SERVERS.forEach(server => {
       const safeName = server.name.replace(/\s+/g, '');
       const restartEl = document.getElementById(`restart-${safeName}`);
       if (restartEl) {
         restartEl.innerHTML = getRestartStatus(server);
       }
    });

    // API Safety Check: Only fetch from network once per minute
    if (now.getMinutes() !== lastUpdatedMinute) {
      lastUpdatedMinute = now.getMinutes();
      updateAllData();
    }
  }

  async function updateAllData() {
    SERVERS.forEach(server => {
      const safeName = server.name.replace(/\s+/g, '');
      fetchServerData(server, safeName);
    });
  }

  async function fetchServerData(server, safeName) {
    try {
      const res = await fetch(`https://api.mcstatus.io/v2/status/java/${server.fetchIp}`);
      const data = await res.json();

      const dotEl = document.getElementById(`dot-${safeName}`);
      const playerEl = document.getElementById(`players-${safeName}`);
      const playerListEl = document.getElementById(`player-list-${safeName}`);
      const btnArea = document.getElementById(`btn-area-${safeName}`);
      const versionEl = document.getElementById(`version-${safeName}`);
      const motdEl = document.getElementById(`motd-${safeName}`);
      const iconEl = document.getElementById(`icon-${safeName}`);
      const timeEl = document.getElementById(`time-${safeName}`);
      const restartEl = document.getElementById(`restart-${safeName}`);

      timeEl.innerText = "Refreshed: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

      if (data.online) {
        dotEl.className = 'status-dot status-online';
        playerEl.innerText = `${data.players.online} / ${data.players.max}`;
        versionEl.innerText = data.version.name_clean;
        motdEl.innerText = data.motd.clean;
        restartEl.style.visibility = "visible"; 
        
        if (data.players.online > 0) {
          if (!document.getElementById(`toggle-${safeName}`)) {
            btnArea.innerHTML = `<button id="toggle-${safeName}">Show Player List</button>`;
            const btn = document.getElementById(`toggle-${safeName}`);
            btn.onclick = () => {
              const isHidden = playerListEl.style.display === 'none';
              playerListEl.style.display = isHidden ? 'flex' : 'none';
              btn.innerText = isHidden ? 'Hide Player List' : 'Show Player List';
            };
          }
          
          // Data existence check for player list
          playerListEl.innerHTML = '';
          if (data.players.list && data.players.list.length > 0) {
            data.players.list.forEach(p => {
              const b = document.createElement('div');
              b.className = 'player-badge';
              b.innerHTML = `<img src="https://minotar.net/avatar/${p.name_clean}/16" style="margin-right: 5px; border-radius: 2px;"> ${p.name_clean}`;
              playerListEl.appendChild(b);
            });
          }
        } else {
          // Reset UI if server is empty
          btnArea.innerHTML = "";
          playerListEl.style.display = "none";
          playerListEl.innerHTML = "";
        }

        if (data.icon) { iconEl.src = data.icon; iconEl.style.display = "block"; }
      } else {
        dotEl.className = 'status-dot status-offline';
        playerEl.innerText = "0 / 0";
        versionEl.innerText = "-";
        iconEl.style.display = "none";
        btnArea.innerHTML = "";
        playerListEl.style.display = "none";
        motdEl.innerText = "Server is currently offline.";
        restartEl.style.visibility = "hidden"; 
      }
    } catch (err) {
      console.error("Error:", err);
    }
  }

  function copyIp(ip, e) {
    navigator.clipboard.writeText(ip);
    const el = e.target;
    const oldText = el.innerText;
    el.innerText = "Copied!";
    setTimeout(() => el.innerText = oldText, 1000);
  }

  initDashboard();
</script>
  </body>
</html>
